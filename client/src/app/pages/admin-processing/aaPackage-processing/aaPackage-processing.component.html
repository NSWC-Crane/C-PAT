<div class="grid grid-cols-12 gap-4">
  <div class="col-span-12">
    <div class="scrollable-aaPackages overflow-hidden">
      <p-table #dt [value]="aaPackages" [globalFilterFields]="['aaPackageId', 'aaPackage']" [rows]="15" [paginator]="true" [scrollable]="true" scrollHeight="flex" [rowHover]="true" dataKey="aaPackageId" editMode="row">
        <ng-template #caption>
          <div class="flex items-center justify-between">
            <p-iconfield iconPosition="left">
              <p-inputicon>
                <i class="pi pi-search"></i>
              </p-inputicon>
              <input pInputText type="text" (input)="filterGlobal($event)" placeholder="Search A&A Packages" id="aaPackageSearch" class="search-input" />
            </p-iconfield>
            <button pButton (click)="onAddNewClick()" [rounded]="true" variant="text" [raised]="true" severity="primary" pTooltip="Add A&A Package"><i class="pi pi-plus" pButtonIcon></i></button>
          </div>
        </ng-template>
        <ng-template #header>
          <tr>
            <th scope="col" pSortableColumn="aaPackageId">A&A Package ID</th>
            <th scope="col" pSortableColumn="aaPackageName">A&A Package Name</th>
            <th scope="col">Actions</th>
          </tr>
        </ng-template>
        <ng-template #body let-aaPackage let-editing="editing" let-ri="rowIndex">
          <tr [pEditableRow]="aaPackage">
            <td>{{ aaPackage.aaPackageId }}</td>
            <td>
              <p-celleditor>
                <ng-template #input>
                  <input pInputText type="text" class="w-full" id="aaPackage" [(ngModel)]="aaPackage.aaPackage" maxlength="50" />
                </ng-template>
                <ng-template #output> {{ aaPackage.aaPackage }} </ng-template>
              </p-celleditor>
            </td>
            <td class="break-all">
              <div class="flex items-center justify-center gap-2">
                @if (!editing) {
                  <button pButton (click)="$event.stopPropagation(); onRowEditInit(aaPackage)" pInitEditableRow [rounded]="true" variant="text"><i class="pi pi-pencil" pButtonIcon></i></button>
                }
                @if (editing) {
                  <button pButton class="mr-2" (click)="$event.stopPropagation(); onRowEditSave(aaPackage)" pSaveEditableRow [rounded]="true" variant="text" severity="success"><i class="pi pi-check" pButtonIcon></i></button>
                }
                @if (editing) {
                  <button pButton (click)="$event.stopPropagation(); onRowEditCancel(aaPackage, ri)" pCancelEditableRow [rounded]="true" variant="text" severity="danger"><i class="pi pi-times" pButtonIcon></i></button>
                }
                @if (!editing) {
                  <button pButton (click)="$event.stopPropagation(); onRowDelete(aaPackage)" [rounded]="true" variant="text" severity="danger"><i class="pi pi-trash" pButtonIcon></i></button>
                }
              </div>
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </div>
</div>
<p-toast />
