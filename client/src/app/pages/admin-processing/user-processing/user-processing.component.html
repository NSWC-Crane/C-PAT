@if (showUserSelect) {
  <div class="scrollable-users overflow-hidden">
    <p-table
      #usersTable
      class="p-datatable-lg"
      [value]="data"
      [columns]="cols"
      [filterDelay]="0"
      [rows]="100"
      [rowsPerPageOptions]="[25, 50, 100]"
      [paginator]="true"
      [scrollable]="true"
      scrollHeight="flex"
      selectionMode="single"
      [globalFilterFields]="['accountStatus', 'firstName', 'lastName', 'displayUsername', 'email', 'lastAccessDate']"
    >
      <ng-template pTemplate="caption">
        <div class="flex items-center justify-between">
          <p-iconField iconPosition="left">
            <p-inputIcon>
              <i class="pi pi-search"></i>
            </p-inputIcon>
            <input pInputText type="text" (input)="filterGlobal($event)" placeholder="Search Users" name="searchUsers" class="search-input" />
          </p-iconField>
          <p-button icon="pi pi-external-link" severity="secondary" [rounded]="true" [text]="true" (click)="exportCSV()" (keydown.enter)="exportCSV()" pTooltip="Export table to CSV" tooltipPosition="left" />
        </div>
      </ng-template>
      <ng-template pTemplate="header" let-columns>
        <tr>
          @for (col of columns; track col.field) {
            <th scope="col" [pSortableColumn]="col.field">{{ col.header }}</th>
          }
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-rowData let-columns="columns">
        <tr [ngClass]="{ 'pending-status': rowData.accountStatus === 'PENDING' }" tabindex="0" class="cursor-pointer" (click)="setUser(rowData)" (keydown.enter)="setUser(rowData)">
          @for (col of columns; track col.field) {
            <td class="break-all">{{ rowData[col.field] }}</td>
          }
        </tr>
      </ng-template>
    </p-table>
  </div>
}

@if (!showUserSelect) {
  <div class="col-span-12">
    <cpat-user [user]="user" [users]="users" [payload]="payload" (userChange)="resetData()" />
  </div>
}
