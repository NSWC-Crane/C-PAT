<div class="row col-span-12">
  <div class="col">
    <div class="p-fluid">
      <div class="toolbar mb-4">
        <div class="flex items-center justify-between">
          <p-iconfield iconPosition="left">
            <p-inputicon>
              <i class="pi pi-search"></i>
            </p-inputicon>
            <input pInputText type="text" id="search" [(ngModel)]="filterValue" (input)="onGlobalFilter($event)" placeholder="Search..." />
          </p-iconfield>
          <button pButton class="ml-2" (click)="clear()" [rounded]="true" [text]="true" [raised]="true" severity="secondary" pTooltip="Clear all filters"><i class="pi pi-filter-slash" pButtonIcon></i></button>
        </div>
        <div class="right-buttons">
          <button pButton class="mr-2" (click)="resetColumnSelections()" [rounded]="true" [text]="true" [raised]="true" severity="secondary" pTooltip="Reset column selections"><i class="pi pi-refresh" pButtonIcon></i></button>
          <button pButton (click)="toggleAddColumnOverlay()" [rounded]="true" [text]="true" [raised]="true" severity="primary"><i class="pi pi-plus" pButtonIcon></i></button>
          <button pButton (click)="exportCSV()" severity="secondary" [rounded]="true" [text]="true"><i class="pi pi-external-link" pButtonIcon></i></button>
          <p-select
            [multiple]="true"
            [checkmark]="true"
            [filter]="true"
            [showClear]="true"
            #ms
            [options]="cols"
            [(ngModel)]="selectedColumns"
            optionLabel="header"
            class="custom-multiselect"
            appendTo="body"
            name="columnSearch"
            filterPlaceholder="Add columns..."
          />
        </div>
      </div>
      <p-table
        #hostAssetTable
        [value]="affectedAssets()"
        [columns]="selectedColumns"
        [paginator]="true"
        [rows]="100"
        [showCurrentPageReport]="true"
        [rowsPerPageOptions]="[25, 50, 100]"
        [totalRecords]="totalRecords()"
        [loading]="isLoading()"
        [globalFilterFields]="['name', 'os', 'macAddress', 'firstSeen', 'lastSeen', 'netBios', 'dns', 'ipAddress', 'systemType', 'uuid', 'source', 'acr', 'acrLastEvaluatedTime', 'aes']"
        [filterDelay]="300"
        [rowHover]="true"
        dataKey="id"
        [resizableColumns]="true"
        [scrollable]="true"
        scrollHeight="calc(100vh - 27rem)"
        class="p-datatable-sm"
      >
        <ng-template #header let-columns>
          <tr>
            @for (col of columns; track col.field) {
              <th scope="col" [pSortableColumn]="col.field" pResizableColumn>
                {{ col.header }}
                <ng-container>
                  <p-columnfilter [type]="col.filterType" [field]="col.field" [showMatchModes]="true" [showOperator]="false" [showAddButton]="false" [showApplyButton]="true" [showClearButton]="true" [display]="'menu'" [showMenu]="true" />
                </ng-container>
              </th>
            }
          </tr>
        </ng-template>
        <ng-template #body let-host let-columns="columns">
          <tr>
            @for (col of columns; track col.field) {
              <td>
                @switch (col.field) {
                  @case ('name') {
                    <span (click)="onHostNameClick(host, $event)" (keyup.enter)="onHostNameClick(host, $event)" style="cursor: pointer; color: var(--p-primary-color); font-weight: bold">
                      {{ host[col.field] }}
                    </span>
                  }
                  @case ('source') {
                    <p-tag [value]="host[col.field]" [rounded]="false" />
                  }
                  @default {
                    {{ host[col.field] }}
                  }
                }
              </td>
            }
          </tr>
        </ng-template>
        <ng-template #emptymessage>
          <tr>
            <td [attr.colspan]="selectedColumns.length" style="text-align: center">No assets to display</td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </div>
</div>

@if (selectedHost()) {
  <cpat-tenable-host-dialog [host]="selectedHost()" [tenableRepoId]="tenableRepoId()" [(visible)]="displayDialog" />
}

<p-toast position="center" key="error" />
