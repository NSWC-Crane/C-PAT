<div class="labels-table-container">
  <p-toast />
  <p-table [value]="poamLabels()" dataKey="labelId">
    <ng-template #header>
      <tr>
        <th scope="col" pSortableColumn="labelName">Label</th>
        <th scope="col" style="width: 8rem">
          <button pButton (click)="addLabel()" [rounded]="true" variant="text" [disabled]="accessLevel() < 2"><i class="pi pi-plus" pButtonIcon></i></button>
        </th>
      </tr>
    </ng-template>
    <ng-template #body let-label let-rowIndex="rowIndex">
      <tr>
        <td>
          @if (!label.isNew) {
            <span>{{ label.labelName }}</span>
          }
          @if (label.isNew) {
            <p-select
              [options]="labelList()"
              [(ngModel)]="label.labelId"
              [filter]="true"
              filterBy="labelName"
              optionLabel="labelName"
              optionValue="labelId"
              class="w-full"
              (onChange)="onLabelChange(label)"
              appendTo="body"
              [disabled]="accessLevel() < 2"
            />
          }
        </td>
        <td>
          <button pButton (click)="deleteLabel(rowIndex)" [rounded]="true" variant="text" severity="danger" [disabled]="accessLevel() < 2"><i class="pi pi-trash" pButtonIcon></i></button>
        </td>
      </tr>
    </ng-template>
    <ng-template #emptymessage>
      <tr>
        <td colspan="2" style="text-align: center">No Labels to Display</td>
      </tr>
    </ng-template>
  </p-table>
</div>
